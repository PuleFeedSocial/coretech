<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTech Systems - Ajustes de Cuenta</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .settings-section {
            background-color: var(--bg-main);
            min-height: calc(100vh - 76px);
        }
        .settings-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px;
        }
        .section-title {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            border-left: 3px solid var(--accent-color);
            padding-left: 12px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .info-value {
            color: #f0f6fc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <nav
        class="navbar navbar-expand-lg navbar-dark bg-dark-custom sticky-top border-bottom border-secondary-custom py-3">
        <div class="container">
            <a class="navbar-brand font-monospace fw-bold text-accent" href="index.html">
                <span class="text-white">&lt;</span>CORETECH<span class="text-white">_SYSTEMS&gt;</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav text-center pt-3 pt-lg-0">
                    <li class="nav-item"><a class="nav-link px-3 py-2" href="index.html#agencia">Agencia</a></li>
                    <li class="nav-item"><a class="nav-link px-3 py-2" href="soluciones.html">Soluciones</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="settings-section py-4">
        <div class="container py-2">
            <div class="row justify-content-center">
                <div class="col-xl-6 col-lg-8 col-11">
                    <div class="settings-card">
                        <div class="font-monospace text-accent mb-2 fs-7">[ ACCOUNT_SETTINGS ]</div>
                        <h3 class="text-white fw-bold mb-4 fs-4">Ajustes de Cuenta</h3>

                        <h6 class="section-title mb-3 fs-6">Información personal</h6>
                        <div id="userInfo">
                            <div class="info-row">
                                <span class="info-label">Nombre</span>
                                <span class="info-value" id="dispName">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Email</span>
                                <span class="info-value" id="dispEmail">-</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">Rol</span>
                                <span class="info-value" id="dispRole">-</span>
                            </div>
                        </div>

                        <h6 class="section-title mb-3 mt-4 fs-6">Cambiar contraseña</h6>
                        <form id="passwordForm">
                            <div class="mb-3">
                                <label class="form-label-custom font-monospace">CONTRASEÑA ACTUAL</label>
                                <input type="password" class="form-control form-control-custom" id="currentPassword" placeholder="••••••••">
                            </div>
                            <div class="mb-3">
                                <label class="form-label-custom font-monospace">NUEVA CONTRASEÑA</label>
                                <input type="password" class="form-control form-control-custom" id="newPassword" placeholder="••••••••">
                            </div>
                            <div class="mb-3">
                                <label class="form-label-custom font-monospace">CONFIRMAR CONTRASEÑA</label>
                                <input type="password" class="form-control form-control-custom" id="confirmPassword" placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn btn-accent px-4 py-2 fw-bold text-white">Actualizar Contraseña</button>
                        </form>

                        <div class="mt-4 pt-3 border-top border-secondary-custom text-center">
                            <small class="text-white-50 font-monospace fs-7">Los cambios se guardan automáticamente en el servidor.</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer
        class="py-4 bg-dark-custom border-top border-secondary-custom font-monospace text-center text-white-50 fs-7 px-3">
        <div class="container">&copy; 2026 CoreTech Systems. All rights reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script>
        const API = window.location.origin.startsWith('http') ? window.location.origin : 'http://localhost:3000';

        function checkAuth() {
            if (!getUser()) window.location.href = 'login.html';
        }

        function loadUser() {
            const user = getUser();
            if (!user) return;
            document.getElementById('dispName').textContent = user.name;
            document.getElementById('dispEmail').textContent = user.email;
            document.getElementById('dispRole').textContent = user.role === 'admin' ? 'Administrador' : 'Cliente';
        }

        document.getElementById('passwordForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const current = document.getElementById('currentPassword').value.trim();
            const newPass = document.getElementById('newPassword').value.trim();
            const confirm = document.getElementById('confirmPassword').value.trim();

            if (!current || !newPass || !confirm) {
                alert('Completa todos los campos.');
                return;
            }
            if (newPass !== confirm) {
                alert('Las contraseñas no coinciden.');
                return;
            }
            if (newPass.length < 6) {
                alert('La contraseña debe tener al menos 6 caracteres.');
                return;
            }

            try {
                const res = await fetch(API + '/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify({ currentPassword: current, newPassword: newPass })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Contraseña actualizada correctamente.');
                    this.reset();
                } else {
                    alert(data.error || 'Error al actualizar.');
                }
            } catch {
                alert('Error de conexión.');
            }
        });

        checkAuth();
        loadUser();
    </script>

</body>

</html>
