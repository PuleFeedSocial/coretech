<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTech Systems - Nuevo Proyecto</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .form-page {
            background-color: var(--bg-main);
            min-height: calc(100vh - 76px);
        }
        .form-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }
        .preview-box {
            width: 100%;
            height: 180px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            background-size: cover;
            background-position: center;
            transition: border-color 0.3s ease;
            cursor: pointer;
        }
        .preview-box.has-image {
            border-color: var(--accent-color);
            border-style: solid;
        }
        .tag-input-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px 12px;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            min-height: 48px;
            cursor: text;
        }
        .tag-input-wrapper .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background-color: rgba(124, 58, 237, 0.15);
            color: var(--accent-color);
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .tag-input-wrapper .tag .remove {
            cursor: pointer;
            opacity: 0.7;
        }
        .tag-input-wrapper .tag .remove:hover {
            opacity: 1;
        }
        .tag-input-wrapper input {
            border: none;
            background: none;
            color: #f0f6fc;
            font-size: 0.9rem;
            outline: none;
            flex: 1;
            min-width: 80px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom sticky-top border-bottom border-secondary-custom py-3">
        <div class="container">
            <a class="navbar-brand font-monospace fw-bold text-accent" href="index.html">
                <span class="text-white">&lt;</span>CORETECH<span class="text-white">_SYSTEMS&gt;</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav text-center pt-3 pt-lg-0">
                    <li class="nav-item"><a class="nav-link px-3 py-2" href="index.html#agencia">Agencia</a></li>
                    <li class="nav-item"><a class="nav-link px-3 py-2" href="soluciones.html">Soluciones</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="form-page py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-7 col-lg-9 col-11">
                    <div class="form-card p-4 p-md-5">
                        <div class="font-monospace text-accent mb-2 fs-7">[ NEW_PROJECT ]</div>
                        <h3 class="text-white fw-bold mb-4 fs-4">Añadir Nuevo Proyecto</h3>

                        <form id="projectForm">
                            <div class="mb-3">
                                <label class="form-label-custom font-monospace">TÍTULO</label>
                                <input type="text" class="form-control form-control-custom" id="title"
                                    placeholder="Nombre del proyecto" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label-custom font-monospace">DESCRIPCIÓN</label>
                                <textarea class="form-control form-control-custom" id="description" rows="4"
                                    placeholder="Describe el proyecto..." required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label-custom font-monospace">IMAGEN</label>
                                <div class="preview-box" id="previewBox" onclick="document.getElementById('fileInput').click()">
                                    <span id="previewText">Haz clic para subir una imagen</span>
                                </div>
                                <input type="file" id="fileInput" accept="image/*" style="display:none">
                                <small class="text-muted-custom font-monospace fs-7 mt-1 d-block">PNG, JPG, WEBP o SVG. Máx 5MB.</small>
                                <input type="hidden" id="image_url" value="">
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label-custom font-monospace">AÑO</label>
                                    <input type="text" class="form-control form-control-custom" id="year"
                                        placeholder="2026">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label-custom font-monospace">STACK TECNOLÓGICO</label>
                                    <input type="text" class="form-control form-control-custom" id="tech_stack"
                                        placeholder="React + Node">
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label-custom font-monospace">ETIQUETAS</label>
                                <div class="tag-input-wrapper" id="tagWrapper">
                                    <input type="text" id="tagInput" placeholder="Escribe y presiona Enter">
                                </div>
                                <small class="text-muted-custom font-monospace fs-7 mt-1 d-block">Presiona Enter o coma para añadir etiquetas.</small>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-accent px-5 py-2 fw-bold text-white">Publicar Proyecto</button>
                                <a href="admin.html" class="btn btn-outline-secondary-custom px-4 py-2 text-white">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 bg-dark-custom border-top border-secondary-custom font-monospace text-center text-white-50 fs-7 px-3">
        <div class="container">&copy; 2026 CoreTech Systems. All rights reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script>
        const API = window.location.origin.startsWith('http') ? window.location.origin : 'http://localhost:3000';
        let tags = [];

        function checkAuth() {
            const user = getUser();
            if (!user || user.role !== 'admin') window.location.href = 'login.html';
        }

        const tagInput = document.getElementById('tagInput');
        const tagWrapper = document.getElementById('tagWrapper');

        function renderTags() {
            document.querySelectorAll('.tag-wrapper-tag').forEach(el => el.remove());
            tags.forEach((t, i) => {
                const span = document.createElement('span');
                span.className = 'tag tag-wrapper-tag';
                span.innerHTML = `${t} <span class="remove" data-index="${i}">✕</span>`;
                tagWrapper.insertBefore(span, tagInput);
            });
            document.querySelectorAll('.tag .remove').forEach(btn => {
                btn.addEventListener('click', function () {
                    tags.splice(parseInt(this.dataset.index), 1);
                    renderTags();
                });
            });
        }

        tagInput.addEventListener('keydown', function (e) {
            if ((e.key === 'Enter' || e.key === ',') && this.value.trim()) {
                e.preventDefault();
                const val = this.value.trim().replace(/,/g, '');
                if (val && !tags.includes(val)) {
                    tags.push(val);
                    renderTags();
                }
                this.value = '';
            }
        });

        tagWrapper.addEventListener('click', () => tagInput.focus());

        document.getElementById('fileInput').addEventListener('change', async function () {
            const file = this.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch(`${API}/api/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() },
                    body: formData
                });
                const data = await res.json();
                if (data.image_url) {
                    document.getElementById('image_url').value = data.image_url;
                    const box = document.getElementById('previewBox');
                    box.style.backgroundImage = `url(${data.image_url})`;
                    box.classList.add('has-image');
                    document.getElementById('previewText').textContent = '';
                } else {
                    alert(data.error || 'Error al subir imagen.');
                }
            } catch {
                alert('Error de conexión al subir imagen.');
            }
        });

        document.getElementById('projectForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const data = {
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('description').value.trim(),
                image_url: document.getElementById('image_url').value,
                year: document.getElementById('year').value.trim(),
                tech_stack: document.getElementById('tech_stack').value.trim(),
                tags
            };
            if (!data.title || !data.description) {
                alert('Título y descripción son obligatorios.');
                return;
            }
            try {
                const res = await fetch(`${API}/api/projects`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + getToken()
                    },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    window.location.href = 'admin.html';
                } else {
                    const err = await res.json();
                    alert(err.error || 'Error al crear proyecto.');
                }
            } catch {
                alert('Error de conexión.');
            }
        });

        checkAuth();
    </script>
</body>

</html>
