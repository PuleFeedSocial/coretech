<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTech Systems - Efectivos</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        th { white-space: nowrap; cursor: pointer; user-select: none; }
        th .sort-arrow { font-size: 0.65rem; margin-left: 3px; opacity: 0.4; }
        th.sort-asc .sort-arrow, th.sort-desc .sort-arrow { opacity: 1; }
        .stats-card { transition: none; }
        .badge-estatus { font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; }
        .badge-activo { background: rgba(0,200,83,0.2); color: #00c853; }
        .badge-inactivo { background: rgba(255,82,82,0.2); color: #ff5252; }
        .badge-default { background: rgba(255,255,255,0.08); color: #aaa; }
        .col-accion { position: sticky; right: 0; background: rgba(8,8,18,0.95); z-index: 1; }
        .fila-efectivo { cursor: pointer; transition: background .15s; }
        .fila-efectivo:hover { background: rgba(124,58,237,0.08) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom sticky-top border-bottom border-secondary-custom py-3">
        <div class="container">
            <a class="navbar-brand font-monospace fw-bold text-accent" href="index.html">
                <span class="text-white">&lt;</span>CORETECH<span class="text-white">_SYSTEMS&gt;</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav text-center pt-3 pt-lg-0"></ul>
            </div>
        </div>
    </nav>

    <section class="dash-section py-4">
        <div class="container py-2">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <div class="font-monospace text-accent mb-1 fs-7">[ NOMINA_GENERAL ]</div>
                    <h2 class="text-white fw-bold mb-0 fs-3">Efectivos</h2>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted-custom font-monospace fs-7" id="totalDisplay"></span>
                    <button class="btn btn-outline-secondary-custom px-3 py-1 text-white fs-7" id="addBtn" style="display:none" onclick="mostrarAdd()">+ Nuevo</button>
                    <button class="btn btn-outline-secondary-custom px-3 py-1 text-white fs-7" onclick="recargar()" title="Recargar desde Google Sheets">↻</button>
                </div>
            </div>

            <div class="row g-2 mb-3" id="statsRow"></div>

            <div class="d-flex flex-wrap gap-2 mb-3">
                <input type="text" class="form-control form-control-custom" id="searchInput" placeholder="Buscar por nombre, placa, Discord..." style="max-width:350px;" oninput="onSearch()">
                <select class="form-control form-control-custom" id="filterEstatus" style="max-width:160px;" onchange="onSearch()">
                    <option value="">Todos los estatus</option>
                    <option value="ACTIVO">Activo</option>
                    <option value="INACTIVO">Inactivo</option>
                    <option value="BAJA">Baja</option>
                </select>
                <select class="form-control form-control-custom" id="filterDepto" style="max-width:200px;" onchange="onSearch()">
                    <option value="">Todos los departamentos</option>
                </select>
                <button class="btn btn-outline-secondary-custom px-3 py-1 text-white" onclick="limpiarFiltros()">Limpiar</button>
            </div>

            <div class="table-responsive table-responsive-custom">
                <table class="table table-custom mb-0">
                    <thead><tr id="tableHeaders"></tr></thead>
                    <tbody id="efectivosBody"><tr><td colspan="10" class="text-center text-muted-custom font-monospace">Cargando...</td></tr></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap gap-2">
                <span class="pagination-info font-monospace" id="paginationInfo"></span>
                <div class="d-flex flex-wrap gap-2 align-items-center">
                    <span class="text-muted-custom fs-7">Ir a:</span>
                    <input type="number" class="form-control form-control-custom" id="gotoPage" min="1" style="width:70px;" onkeydown="if(event.key==='Enter')irAPagina()">
                    <button class="btn btn-outline-secondary-custom text-white fs-7 px-2 py-1" onclick="irAPagina()">Ir</button>
                    <button class="btn btn-outline-secondary-custom px-3 py-1 text-white fs-7" onclick="cambiarPag(-1)">◀ Anterior</button>
                    <button class="btn btn-outline-secondary-custom px-3 py-1 text-white fs-7" onclick="cambiarPag(1)">Siguiente ▶</button>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark-secondary border border-secondary-custom">
                <div class="modal-header border-secondary-custom">
                    <h5 class="modal-title text-white fw-bold font-monospace" id="editModalTitle">Editar</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="editModalBody"></div>
                <div class="modal-footer border-secondary-custom">
                    <button type="button" class="btn btn-outline-secondary-custom text-white" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-accent text-white fw-bold" onclick="guardarEdicion()">Guardar</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark-secondary border border-secondary-custom">
                <div class="modal-header border-secondary-custom">
                    <h5 class="modal-title text-white fw-bold font-monospace" id="detailModalTitle">Detalle</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailModalBody"></div>
                <div class="modal-footer border-secondary-custom" id="detailModalFooter"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="bajaModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content bg-dark-secondary border border-secondary-custom">
                <div class="modal-header border-secondary-custom">
                    <h5 class="modal-title text-white fw-bold font-monospace fs-6">Dar de Baja</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-white-50 fs-7 mb-2">Agente: <span id="bajaNombre" class="text-white"></span></div>
                    <label class="text-muted-custom fs-7 mb-1">Fecha de egreso</label>
                    <input type="date" class="form-control form-control-custom" id="bajaFecha">
                    <input type="hidden" id="bajaPlaca">
                </div>
                <div class="modal-footer border-secondary-custom">
                    <button type="button" class="btn btn-outline-secondary-custom text-white" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-accent text-white fw-bold" onclick="confirmarBaja()">Dar de Baja</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 bg-dark-custom border-top border-secondary-custom font-monospace text-center text-white-50 fs-7 px-3">
        <div class="container">&copy; 2026 CoreTech Systems. All rights reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script>
        const API = '';
        let allData = [];
        let filtered = [];
        let sortKey = null;
        let sortDir = 1;
        let page = 1;
        const perPage = 50;

        const COLUMNS = ['N° PLACA', 'NOMBRE IC', 'JERARQUÍA', 'DISCORD', 'DEPARTAMENTO', 'FECHA DE INGRESO', 'ESTATUS', 'CASOS ESPECIALES', 'BONOS', 'FECHA DE EGRESO'];
        let esAdmin = getUser() && getUser().role === 'admin';
        let valOptions = {};

        function sel(id, current, options) {
            if (!options || !options.length) return `<input class="form-control form-control-custom" id="${id}" value="${(current||'').replace(/"/g,'&quot;')}">`;
            const esc = v => (v||'').replace(/"/g,'&quot;');
            return `<select class="form-control form-control-custom" id="${id}"><option value="">—</option>${options.map(o => `<option value="${esc(o)}"${(current||'').toUpperCase()===o.toUpperCase()?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
        }

        async function cargarDatos() {
            const tbody = document.getElementById('efectivosBody');
            tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted-custom font-monospace">Cargando...</td></tr>';
            try {
                const res = await fetch(API + '/api/efectivos', { headers: { 'Authorization': 'Bearer ' + getToken() } });
                if (!res.ok) throw new Error('Error ' + res.status);
                const d = await res.json();
                allData = d.data || [];
                renderHeaders();
                renderStats();
                onSearch();
            } catch {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted-custom font-monospace">Error al cargar datos</td></tr>';
            }
        }

        function renderHeaders() {
            const tr = document.getElementById('tableHeaders');
            tr.innerHTML = COLUMNS.map(c => `<th onclick="ordenar('${c}')">${c}<span class="sort-arrow">${sortKey === c ? (sortDir === 1 ? '▲' : '▼') : '▲'}</span></th>`).join('');
        }

        function renderStats() {
            const total = allData.filter(r => {
                const n = (r['NOMBRE IC'] || '').trim().toUpperCase();
                return n && n !== 'SIN DATOS' && n !== '(NADA)' && n !== '—';
            }).length;
            const activos = allData.filter(r => r['ESTATUS']?.toUpperCase() === 'ACTIVO').length;
            const inactivos = allData.filter(r => ['INACTIVO', 'BAJA'].includes(r['ESTATUS']?.toUpperCase())).length;
            const deptos = [...new Set(allData.map(r => r['DEPARTAMENTO'] || '').filter(Boolean))].sort();
            const sel = document.getElementById('filterDepto');
            sel.innerHTML = '<option value="">Todos los departamentos</option>' + deptos.map(d => '<option value="' + d + '">' + d + '</option>').join('');

            document.getElementById('statsRow').innerHTML = `
                <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${total}</div><div class="text-muted-custom fs-7">Total efectivos</div></div></div>
                <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${activos}</div><div class="text-muted-custom fs-7">Activos</div></div></div>
                <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${inactivos}</div><div class="text-muted-custom fs-7">Inactivos</div></div></div>
                <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${deptos.length}</div><div class="text-muted-custom fs-7">Departamentos</div></div></div>
            `;
        }

        function onSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const estatusF = document.getElementById('filterEstatus').value.toUpperCase();
            const deptoF = document.getElementById('filterDepto').value;

            filtered = allData.filter(r => {
                if (estatusF && r['ESTATUS']?.toUpperCase() !== estatusF) return false;
                if (deptoF && r['DEPARTAMENTO'] !== deptoF) return false;
                if (q) {
                    const vals = Object.values(r).join(' ').toLowerCase();
                    if (!vals.includes(q)) return false;
                }
                return true;
            });

            if (sortKey) {
                filtered.sort((a, b) => {
                    const va = (a[sortKey] || '').toLowerCase();
                    const vb = (b[sortKey] || '').toLowerCase();
                    return va.localeCompare(vb, 'es') * sortDir;
                });
            }

            page = 1;
            render();
        }

        function ordenar(key) {
            if (sortKey === key) { sortDir *= -1; }
            else { sortKey = key; sortDir = 1; }
            renderHeaders();
            if (filtered.length) {
                filtered.sort((a, b) => {
                    const va = (a[sortKey] || '').toLowerCase();
                    const vb = (b[sortKey] || '').toLowerCase();
                    return va.localeCompare(vb, 'es') * sortDir;
                });
            }
            render();
        }

        function render() {
            const tbody = document.getElementById('efectivosBody');
            const start = (page - 1) * perPage;
            const items = filtered.slice(start, start + perPage);

            if (!items.length) {
                tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted-custom font-monospace">Sin resultados</td></tr>';
            } else {
                tbody.innerHTML = items.map(r => `<tr class="fila-efectivo" onclick="verDetalle('${r['N° PLACA']}')">
                    ${COLUMNS.map(c => {
                        let val = r[c] || '';
                        if (c === 'ESTATUS') {
                            const cls = val.toUpperCase() === 'ACTIVO' ? 'badge-activo' : val.toUpperCase() === 'INACTIVO' ? 'badge-inactivo' : 'badge-default';
                            return `<td><span class="badge-estatus ${cls}">${val || '—'}</span></td>`;
                        }
                        return `<td class="${c === 'NOMBRE IC' || c === 'CASOS ESPECIALES' ? '' : 'font-monospace'}">${val || '—'}</td>`;
                    }).join('')}
                </tr>`).join('');
            }

            const totalPag = Math.ceil(filtered.length / perPage);
            document.getElementById('totalDisplay').textContent = filtered.length + ' de ' + allData.length + ' registros';
            document.getElementById('paginationInfo').textContent = 'Página ' + page + ' de ' + (totalPag || 1) + ' (' + filtered.length + ' registros)';
            document.getElementById('gotoPage').value = '';
        }

        function cambiarPag(dir) {
            const totalPag = Math.ceil(filtered.length / perPage);
            page = Math.max(1, Math.min(totalPag, page + dir));
            render();
        }

        function irAPagina() {
            const totalPag = Math.ceil(filtered.length / perPage);
            const val = parseInt(document.getElementById('gotoPage').value);
            if (val >= 1 && val <= totalPag) { page = val; render(); }
        }

        function limpiarFiltros() {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterEstatus').value = '';
            document.getElementById('filterDepto').value = '';
            onSearch();
        }

        function recargar() {
            fetch(API + '/api/efectivos/refresh', { headers: { 'Authorization': 'Bearer ' + getToken() } })
                .then(r => r.json()).then(() => cargarDatos()).catch(() => cargarDatos());
        }

        function abrirEditar(titulo, html, guardarFn) {
            document.getElementById('editModalTitle').textContent = titulo;
            document.getElementById('editModalBody').innerHTML = html;
            window._guardarEdicion = guardarFn;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        function guardarEdicion() {
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            if (window._guardarEdicion) window._guardarEdicion();
        }

        function mostrarAdd() {
            abrirEditar('Nuevo Efectivo',
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">NOMBRE IC *</label><input class="form-control form-control-custom" id="f_nombre"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">JERARQUÍA</label>' + sel('f_jerarquia', '', valOptions['JERARQUÍA']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">DISCORD</label><input class="form-control form-control-custom" id="f_discord"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">DEPARTAMENTO</label>' + sel('f_depto', '', valOptions['DEPARTAMENTO']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">FECHA DE INGRESO</label><input class="form-control form-control-custom" id="f_ingreso" type="date"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">ESTATUS</label>' + sel('f_estatus', '', valOptions['ESTATUS']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">CASOS ESPECIALES</label>' + sel('f_casos', '', valOptions['CASOS ESPECIALES']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">BONOS</label><input class="form-control form-control-custom" id="f_bonos"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">FECHA DE EGRESO</label><input class="form-control form-control-custom" id="f_egreso" type="date"></div>',
                async () => {
                    const body = {
                        nombre: document.getElementById('f_nombre').value.trim(),
                        jerarquia: document.getElementById('f_jerarquia').value.trim(),
                        discord: document.getElementById('f_discord').value.trim(),
                        departamento: document.getElementById('f_depto').value.trim(),
                        fechaIngreso: document.getElementById('f_ingreso').value,
                        estatus: document.getElementById('f_estatus').value.trim(),
                        casosEspeciales: document.getElementById('f_casos').value.trim(),
                        bonos: document.getElementById('f_bonos').value.trim(),
                        fechaEgreso: document.getElementById('f_egreso').value
                    };
                    if (!body.nombre) return alert('Nombre requerido');
                    const res = await fetch(API + '/api/efectivos', {
                        method: 'POST', headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) { const e = await res.json(); return alert(e.error || 'Error'); }
                    const r = await res.json();
                    alert('Agregado con placa ' + r.placa);
                    cargarDatos();
                });
        }

        function mostrarEdit(placa) {
            const r = allData.find(d => d['N° PLACA'] === placa);
            if (!r) return alert('No encontrado');
            abrirEditar('Editar Placa ' + placa,
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">NOMBRE IC</label><input class="form-control form-control-custom" id="f_nombre" value="' + (r['NOMBRE IC'] || '').replace(/"/g, '&quot;') + '"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">JERARQUÍA</label>' + sel('f_jerarquia', r['JERARQUÍA'] || '', valOptions['JERARQUÍA']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">DISCORD</label><input class="form-control form-control-custom" id="f_discord" value="' + (r['DISCORD'] || '').replace(/"/g, '&quot;') + '"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">DEPARTAMENTO</label>' + sel('f_depto', r['DEPARTAMENTO'] || '', valOptions['DEPARTAMENTO']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">FECHA DE INGRESO</label><input class="form-control form-control-custom" id="f_ingreso" value="' + (r['FECHA DE INGRESO'] || '') + '"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">ESTATUS</label>' + sel('f_estatus', r['ESTATUS'] || '', valOptions['ESTATUS']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">CASOS ESPECIALES</label>' + sel('f_casos', r['CASOS ESPECIALES'] || '', valOptions['CASOS ESPECIALES']) + '</div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">BONOS</label><input class="form-control form-control-custom" id="f_bonos" value="' + (r['BONOS'] || '').replace(/"/g, '&quot;') + '"></div>' +
                '<div class="mb-2"><label class="text-muted-custom fs-7 mb-1">FECHA DE EGRESO</label><input class="form-control form-control-custom" id="f_egreso" value="' + (r['FECHA DE EGRESO'] || '') + '"></div>',
                async () => {
                    const body = {
                        nombre: document.getElementById('f_nombre').value.trim(),
                        jerarquia: document.getElementById('f_jerarquia').value.trim(),
                        discord: document.getElementById('f_discord').value.trim(),
                        departamento: document.getElementById('f_depto').value.trim(),
                        fechaIngreso: document.getElementById('f_ingreso').value.trim(),
                        estatus: document.getElementById('f_estatus').value.trim(),
                        casosEspeciales: document.getElementById('f_casos').value.trim(),
                        bonos: document.getElementById('f_bonos').value.trim(),
                        fechaEgreso: document.getElementById('f_egreso').value.trim()
                    };
                    const res = await fetch(API + '/api/efectivos/' + placa, {
                        method: 'PUT', headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) { const e = await res.json(); return alert(e.error || 'Error'); }
                    cargarDatos();
                });
        }

        function verDetalle(placa) {
            const r = allData.find(d => d['N° PLACA'] === placa);
            if (!r) return;
            document.getElementById('detailModalTitle').textContent = 'Placa ' + placa + ' — ' + (r['NOMBRE IC'] || '');
            document.getElementById('detailModalBody').innerHTML = '<div class="row g-3">' +
                COLUMNS.map(c => `<div class="col-6 col-md-4"><div class="text-muted-custom fs-7 mb-1">${c}</div><div class="text-white font-monospace fs-6">${r[c] || '—'}</div></div>`).join('') +
                '</div>';
            document.getElementById('detailModalFooter').innerHTML = esAdmin
                ? '<button type="button" class="btn btn-outline-secondary-custom text-white" data-bs-dismiss="modal">Cerrar</button><button type="button" class="btn btn-accent text-white fw-bold me-2" onclick="bootstrap.Modal.getInstance(document.getElementById(\'detailModal\')).hide();mostrarEdit(\'' + placa + '\')">✏️ Editar</button><button type="button" class="btn btn-outline-danger text-white" onclick="bootstrap.Modal.getInstance(document.getElementById(\'detailModal\')).hide();abrirBaja(\'' + placa + '\')">Dar de Baja</button>'
                : '<button type="button" class="btn btn-outline-secondary-custom text-white" data-bs-dismiss="modal">Cerrar</button>';
            new bootstrap.Modal(document.getElementById('detailModal')).show();
        }

        function abrirBaja(placa) {
            document.getElementById('bajaPlaca').value = placa;
            document.getElementById('bajaFecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('bajaNombre').textContent = allData.find(d => d['N° PLACA'] === placa)?.['NOMBRE IC'] || '';
            new bootstrap.Modal(document.getElementById('bajaModal')).show();
        }

        function confirmarBaja() {
            const placa = document.getElementById('bajaPlaca').value;
            const fecha = document.getElementById('bajaFecha').value;
            if (!fecha) return alert('Selecciona una fecha de egreso');
            const r = allData.find(d => d['N° PLACA'] === placa);
            if (!r) return;
            fetch(API + '/api/efectivos/' + placa, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + getToken(), 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nombre: r['NOMBRE IC'] || '',
                    jerarquia: r['JERARQUÍA'] || '',
                    discord: r['DISCORD'] || '',
                    departamento: r['DEPARTAMENTO'] || '',
                    fechaIngreso: r['FECHA DE INGRESO'] || '',
                    estatus: 'BAJA',
                    casosEspeciales: r['CASOS ESPECIALES'] || '',
                    bonos: r['BONOS'] || '',
                    fechaEgreso: fecha
                })
            }).then(res => {
                bootstrap.Modal.getInstance(document.getElementById('bajaModal')).hide();
                if (!res.ok) return res.json().then(e => alert(e.error || 'Error'));
                cargarDatos();
            });
        }

        if (esAdmin) document.getElementById('addBtn').style.display = 'inline-block';

        fetch(API + '/api/efectivos/validations').then(r => r.json()).then(d => { valOptions = d; }).catch(() => {});
        cargarDatos();
    </script>
</body>
</html>
