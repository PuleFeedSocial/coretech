<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTech Systems - Expediente</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .timeline { position: relative; padding-left: 2rem; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: rgba(124,58,237,0.25); }
        .timeline-item { position: relative; margin-bottom: 1rem; }
        .timeline-dot { position: absolute; left: -1.65rem; top: 4px; width: 14px; height: 14px; border-radius: 50%; border: 2px solid; background: rgba(8,8,18,0.95); }
        .timeline-dot.asistencia { border-color: #3498db; }
        .timeline-dot.h50 { border-color: #e67e22; }
        .timeline-dot.ascenso { border-color: #f1c40f; }
        .timeline-dot.ausencia { border-color: #9b59b6; }
        .timeline-dot.asignacion { border-color: #2ecc71; }
        .timeline-dot.baja { border-color: #e74c3c; }
        .timeline-dot.sistema { border-color: #7289da; }
        .timeline-time { font-size: 0.65rem; color: rgba(255,255,255,0.35); font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark-custom sticky-top border-bottom border-secondary-custom py-3">
        <div class="container">
            <a class="navbar-brand font-monospace fw-bold text-accent" href="index.html">
                <span class="text-white">&lt;</span>CORETECH<span class="text-white">_SYSTEMS&gt;</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav text-center pt-3 pt-lg-0"></ul>
            </div>
        </div>
    </nav>

    <section class="dash-section py-4">
        <div class="container py-2">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <div class="font-monospace text-accent mb-1 fs-7">[ EXPEDIENTE ]</div>
                    <h2 class="text-white fw-bold mb-0 fs-3" id="userName">Cargando...</h2>
                    <div class="text-muted-custom font-monospace fs-7 mt-1" id="userIdDisplay"></div>
                </div>
                <a href="gnp-dashboard.html" class="btn btn-outline-secondary-custom text-white fs-7 px-3 py-1">⬅ Volver al Dashboard</a>
            </div>

            <div class="row g-3 mb-4" id="statsRow"></div>

            <div class="row g-4">
                <div class="col-12 col-lg-7">
                    <div class="card bg-dark-secondary border-secondary-custom p-3">
                        <h5 class="text-white fw-bold fs-6 mb-3">📜 Línea de Tiempo</h5>
                        <div id="timeline" class="timeline">
                            <div class="text-center text-muted-custom font-monospace py-4">Cargando...</div>
                        </div>
                    </div>
                </div>
                <div class="col-12 col-lg-5">
                    <div class="card bg-dark-secondary border-secondary-custom p-3 mb-3">
                        <h5 class="text-white fw-bold fs-6 mb-3">📊 Resumen</h5>
                        <div id="resumenBody" class="text-muted-custom font-monospace">Cargando...</div>
                    </div>
                    <div class="card bg-dark-secondary border-secondary-custom p-3">
                        <h5 class="text-white fw-bold fs-6 mb-3">🪖 Cuartel Actual</h5>
                        <div id="cuartelBody" class="text-muted-custom font-monospace">Cargando...</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 bg-dark-custom border-top border-secondary-custom font-monospace text-center text-white-50 fs-7 px-3">
        <div class="container">&copy; 2026 CoreTech Systems. All rights reserved.</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script>
        const API = window.location.origin.startsWith('http') ? window.location.origin : 'http://localhost:3000';
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('userId');

        if (!userId) {
            document.querySelector('.container').innerHTML = '<div class="text-center text-muted-custom font-monospace py-5">⚠️ No se especificó un usuario.</div>';
        } else {
            checkAuth();

            function icono(tipo) {
                const map = { asistencia: '📝', h50: '⏱️', ascenso: '🎖️', ausencia: '✈️', asignacion: '📥', baja: '📤', bot: '🤖' };
                return map[tipo] || '📌';
            }

            fetch(API + '/api/gnp/expediente/' + userId, {
                headers: { 'Authorization': 'Bearer ' + getToken() }
            })
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(d => {
                document.getElementById('userName').textContent = d.displayName;
                document.getElementById('userIdDisplay').textContent = 'ID: ' + d.userId;

                const totalAsis = d.asistencias.length;
                const totalH50 = d.h50.length;
                const totalH50Min = d.h50.reduce((s, x) => s + (x.minutos || 0), 0);

                document.getElementById('statsRow').innerHTML = `
                    <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${totalAsis}</div><div class="text-muted-custom fs-7">Asistencias</div></div></div>
                    <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${Math.floor(totalH50Min/60)}h ${totalH50Min%60}m</div><div class="text-muted-custom fs-7">H50 Total</div></div></div>
                    <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white">${d.perfil ? new Date(d.perfil.ultimoAscenso).toLocaleDateString() : '—'}</div><div class="text-muted-custom fs-7">Último Ascenso</div></div></div>
                    <div class="col-6 col-md-3"><div class="card bg-dark-secondary border-secondary-custom p-3 text-center"><div class="fs-4 fw-bold text-white" style="text-transform:uppercase">${d.cuartelActual || '—'}</div><div class="text-muted-custom fs-7">Cuartel</div></div></div>
                `;

                // Merge & sort timeline
                const events = [];
                d.asistencias.forEach(a => events.push({ ts: new Date(a.timestamp), tipo: 'asistencia', html: `<strong>Asistencia</strong> — ${a.horaEntrada} a ${a.horaSalida} (H50: ${a.h50Momento}) · ${a.cuartel.toUpperCase()}` }));
                d.h50.forEach(h => events.push({ ts: new Date(h.timestamp), tipo: 'h50', html: `<strong>H50</strong> — ${Math.floor(h.minutos/60)}h ${h.minutos%60}m · Emisor: ${h.emisor} · Relegado: ${h.relegado} · ${h.cuartel.toUpperCase()}` }));
                d.logs.forEach(l => events.push({ ts: new Date(l.timestamp), tipo: l.tipo === 'bot' ? (l.accion.includes('ASCENSO') ? 'ascenso' : l.accion.includes('BAJA') ? 'baja' : l.accion.includes('ASIGNACIÓN') ? 'asignacion' : l.accion.includes('AUSENCIA') || l.accion.includes('LICENCIA') ? 'ausencia' : 'bot') : 'sistema', html: `<strong>${l.accion}</strong><br>${l.descripcion.replace(/\n/g, '<br>')}` }));

                events.sort((a, b) => b.ts - a.ts);

                const timeline = document.getElementById('timeline');
                if (!events.length) {
                    timeline.innerHTML = '<div class="text-center text-muted-custom font-monospace py-4">Sin eventos registrados</div>';
                } else {
                    timeline.innerHTML = events.slice(0, 100).map(e =>
                        `<div class="timeline-item">
                            <div class="timeline-dot ${e.tipo}"></div>
                            <div class="timeline-time">${e.ts.toLocaleString()}</div>
                            <div class="text-white" style="font-size:0.9rem;">${icono(e.tipo)} ${e.html}</div>
                        </div>`
                    ).join('');
                }

                document.getElementById('resumenBody').innerHTML = d.perfil
                    ? `<div class="mb-2"><span class="text-muted-custom">Último ascenso:</span> <span class="text-white">${new Date(d.perfil.ultimoAscenso).toLocaleDateString()}</span></div>
                       <div class="mb-2"><span class="text-muted-custom">Antigüedad:</span> <span class="text-white">${Math.floor((Date.now() - new Date(d.perfil.ultimoAscenso).getTime()) / 86400000)} días desde ascenso</span></div>`
                    : '<div class="text-muted-custom">Sin perfil registrado</div>';

                if (d.ausencia) {
                    document.getElementById('resumenBody').innerHTML +=
                       `<div class="mt-3 pt-3 border-top border-secondary-custom">
                            <div class="text-warning fw-bold mb-1">✈️ De ausencia</div>
                            <div class="text-muted-custom">Hasta: <span class="text-white">${new Date(d.ausencia.fechaFin).toLocaleDateString()}</span></div>
                            <div class="text-muted-custom">Motivo: <span class="text-white">${d.ausencia.motivo || '—'}</span></div>
                        </div>`;
                }

                document.getElementById('cuartelBody').innerHTML = d.cuartelActual
                    ? `<div class="text-white fs-5 fw-bold" style="text-transform:uppercase">${d.cuartelActual}</div>`
                    : '<div class="text-muted-custom">Sin cuartel asignado</div>';
            })
            .catch(() => {
                document.getElementById('userName').textContent = 'Error al cargar';
                document.getElementById('timeline').innerHTML = '<div class="text-center text-muted-custom font-monospace py-4">Error al cargar expediente</div>';
            });
        }
    </script>
</body>
</html>
